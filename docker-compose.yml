services:
  redis:
    image: redis:7-alpine
    container_name: beelzebub-redis
    restart: always

  beelzebub:
    build: .
    container_name: beelzebub
    restart: always
    depends_on:
      - redis
    ports:
      - "22:22"
      - "23:23"
      - "2222:2222"
      - "8080:8080"
      - "8081:8081"
      - "8888:8888"
      - "80:80"
      - "3306:3306"
      - "2112:2112" #Prometheus Open Metrics
    environment:
      RABBITMQ_URI: ${RABBITMQ_URI}
      OPEN_AI_SECRET_KEY: ${OPEN_AI_SECRET_KEY}
    volumes:
      - "./configurations:/configurations"
